services:
  - type: web
    name: kalshi-signal
    env: python
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" -c gunicorn.conf.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kalshi-signal-db
          property: connectionString
      - key: MODEL_PATH
        value: raw_feature_model.pkl
      # Set in Render dashboard (do not commit secrets):
      # KALSHI_API_KEY_ID — API key ID from kalshi.com/account/api
      # KALSHI_PRIVATE_KEY — full RSA private key PEM (Render preserves newlines)

databases:
  - name: kalshi-signal-db
    databaseName: kalshi_signal
    plan: free
