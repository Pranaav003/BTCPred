[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: pure unit tests",
    "integration: DB/API integration tests",
    "e2e: end-to-end pipeline tests",
]

[tool.coverage.run]
source = ["app", "sim"]
omit = ["tests/*", "*/__pycache__/*"]

[tool.coverage.report]
show_missing = true

[tool.ruff]
target-version = "py311"
extend-exclude = [".venv", "sim_results"]

[tool.ruff.lint]
# E includes E722 (bare except). BLE001 flags blind `except Exception` so no new
# silent catch can creep in; the existing ~legitimate broad catches (scheduler
# job boundaries, etc.) are frozen by re-seeding the baseline once.
select = ["E", "F", "I", "BLE001"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
follow_imports = "silent"
